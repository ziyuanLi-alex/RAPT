<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Windows 11 风格的科技蓝渐变 -->
    <linearGradient id="bg_gradient" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0052D4"/>
      <stop offset="50%" stop-color="#4364F7"/>
      <stop offset="100%" stop-color="#6FB1FC"/>
    </linearGradient>
    
    <!-- 微微的发光效果，增加立体感 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景容器 (圆角矩形，符合 Win11 App 图标规范) -->
  <rect x="16" y="16" width="224" height="224" rx="52" fill="url(#bg_gradient)" />

  <!-- 图标主体组 -->
  <g transform="translate(128, 128)" filter="url(#glow)">
    
    <!-- 1. 抽象骨架 (Pose) -->
    <!-- 头部 -->
    <circle cx="0" cy="-45" r="14" fill="white" opacity="0.95"/>
    <!-- 脊柱 -->
    <line x1="0" y1="-31" x2="0" y2="25" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <!-- 腿部 (动态张开) -->
    <path d="M -22 75 L 0 25 L 22 75" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 手臂 (连接点在脊柱上部) -->
    <path d="M -28 -5 L 0 -20 L 28 -5" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- 2. 射频波纹 (Radio Waves) -->
    <!-- 右侧信号 -->
    <path d="M 45 -35 A 60 60 0 0 1 45 55" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M 65 -55 A 90 90 0 0 1 65 75" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4"/>
    
    <!-- 左侧信号 (对称呼应) -->
    <path d="M -45 -35 A 60 60 0 0 0 -45 55" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M -65 -55 A 90 90 0 0 0 -65 75" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4"/>

  </g>
</svg>